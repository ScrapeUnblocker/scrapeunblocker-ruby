name: Publish to RubyGems

# Publishes on every GitHub Release. Uses RubyGems Trusted Publishing (OIDC) -
# no API keys stored. Configure the trusted publisher once at
# https://rubygems.org/profile/oidc/pending_trusted_publishers for the
# "scrapeunblocker" gem pointing at this repo + workflow (publish.yml).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: rubygems/release-gem@v1
